<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');
:root{--g9:#04200f;--g8:#0a3a1e;--g7:#0f4f28;--g6:#166334;--g5:#1d7a40;--g4:#28944f;--g1:#c4efd4;--g0:#edf9f2;--gold:#d4a820;--goldd:#9c7810;--goldl:#fdf3d0;--red:#c53a22;--w:#fff;--gray1:#f5f5f2;--gray2:#e8e8e4;--gray3:#d0d0c8;--gray5:#8a8a82;--gray7:#3a3a34;--gray9:#1a1a14;--r:12px;--rl:18px;--rx:24px;--sh2:0 6px 24px rgba(0,0,0,.16);--sh3:0 12px 48px rgba(0,0,0,.24);--safe-bottom:env(safe-area-inset-bottom,0px)}

.lcard{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:var(--rx);padding:32px;width:100%;max-width:440px;backdrop-filter:blur(12px)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

RUBRIQUES.forEach(function(rub) {
  rub.subs.forEach(function(sub) {
    (sub.ss || []).forEach(function(ss) {
      (ss.items || []).forEach(function(item) {
        ALL_ITEMS.push({item:item, rub:rub, sub:sub, ss:ss});
      });
    });
  });
});

// Pour la recherche : items uniques par id Drive
var UNIQ = [];

var CODE = "MOM2025";

// ═══ AUTH ════════════════════════════════════════════════════════
function selAge(btn) {
  document.querySelectorAll(".lage-btn").forEach(function(b) { b.classList.remove("sel"); });
  btn.classList.add("sel");
  selAge_ = btn.dataset.age;
  document.getElementById("lbtn").disabled = false;
}

function tryLogin() {
  var v = document.getElementById("ci").value.toUpperCase();
  if (!selAge_) { document.getElementById("lerr").style.display = "block"; return; }
  if (v === CODE) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
    var lbl = selAge_ === "ALL" ? "Tous niveaux" : selAge_;
    document.getElementById("topbar-age").textContent = lbl + " (changer)";
    updateTabCnt();
    goSection("bib");
  } else {
    document.getElementById("lerr").style.display = "block";
    document.getElementById("ci").value = "";
    document.getElementById("ci").focus();
  }
}
document.getElementById("ci").addEventListener("keydown", function(e) { if (e.key === "Enter") tryLogin(); });

function doLogout() {
  document.getElementById("app").style.display = "none";
  document.getElementById("login").style.display = "flex";
  document.getElementById("ci").value = "";
  selAge_ = null;
  document.querySelectorAll(".lage-btn").forEach(function(b) { b.classList.remove("sel"); });
  document.getElementById("lbtn").disabled = true;
}

// ═══ AGE UTILS ═══════════════════════════════════════════════════
function ageOk(item, age) {
  if (!age || age === "ALL") return true;
  return item.ages && item.ages.indexOf(age) >= 0;
}
function countSub(sub, age) {
  var n = 0;
  (sub.ss || []).forEach(function(ss) { (ss.items || []).forEach(function(it) { if (ageOk(it, age)) n++; }); });
  return n;
}
function countRub(rub, age) {
  var seen = {}, n = 0;
  rub.subs.forEach(function(sub) {
    (sub.ss || []).forEach(function(ss) {
      (ss.items || []).forEach(function(it) { if (!seen[it.id] && ageOk(it, age)) { seen[it.id] = true; n++; } });
    });
  });
  return n;
}
function updateTabCnt() {
  var seen = {}, total = 0;
  ALL_ITEMS.forEach(function(x) { if (!seen[x.item.id] && ageOk(x.item, selAge_)) { seen[x.item.id] = true; total++; } });
  document.getElementById("stab-cnt").textContent = total;
}

// ═══ SECTION NAV ═════════════════════════════════════════════════
function goSection(s) {
  curSection = s;
  document.querySelectorAll(".stab").forEach(function(el) { el.classList.remove("act"); });
  var stab = document.getElementById("stab-" + s);
  if (stab) stab.classList.add("act");
  document.querySelectorAll(".mni").forEach(function(el) { el.classList.remove("act"); });
  var mni = document.getElementById("mn-" + s);
  if (mni) mni.classList.add("act");
  document.getElementById("si").value = "";

  if (s === "bib")    { buildSbBib(); goPage("home"); }
  else if (s === "plan")   { buildSbPlan(); renderPlan(); }
  else if (s === "ressources") { goSection_ressources(); }
  else if (s === "saison") { buildSbEmpty(); renderSoon("📅", "Planification de saison", "Creez et gerez vos blocs chronologiques par categorie.", "Livrable 2 — en developpement"); }
  else if (s === "seance") { buildSbEmpty(); renderSoon("📋", "Ma seance", "Preparez votre canevas de seance avec blocs variables et sauvegarde Drive.", "Livrable 3 — en developpement"); }
}

// ═══ SIDEBAR ═════════════════════════════════════════════════════
function buildSbBib() {
  var sb = document.getElementById("sidebar");
  var h = '<div class="sb-sec"><div class="sb-sec-lbl">Navigation</div>';
  h += sbItem("home", "🏠", "Accueil", curPage === "home", "goPage('home')");
  h += '</div><div class="sb-div"></div>';

  RUBRIQUES.forEach(function(rub) {
    h += '<div class="sb-sec"><div class="sb-sec-lbl">' + rub.num + " — " + rub.label + (rub.soon ? ' <span style="font-size:9px;opacity:.5">(bientot)</span>' : "") + "</div>";
    rub.subs.forEach(function(sub) {
      if (sub.soon) {
        h += '<div class="sb-item" style="opacity:.4;cursor:default"><div class="sb-icon">' + sub.icon + "</div>" + sub.label + '<span class="sb-soon">Bientot</span></div>';
        return;
      }
      var cnt = countSub(sub, selAge_);
      var act = curSubId === sub.id && curPage === "sub";
      h += sbItem(sub.id, sub.icon, sub.label, act, "openSub('" + sub.id + "')", cnt, countSub(sub, null));
    });
    h += '</div><div class="sb-div"></div>';
  });
  h += '<div style="flex:1"></div><div style="padding:11px 14px;border-top:1px solid rgba(255,255,255,.06)"><div style="font-size:10px;color:rgba(255,255,255,.22);line-height:1.6">EDR du MOM<br>ecolederugby.mom@gmail.com<br>Code : <strong style="color:rgba(255,255,255,.4)">MOM2025</strong></div></div>';
  sb.innerHTML = h;
}

function sbItem(id, icon, label, act, onclick_, cnt, total) {
  var cntHtml = "";
  if (cnt !== undefined) {
    var filt = (total !== undefined && cnt < total) ? " filt" : "";
    cntHtml = '<span class="sb-cnt' + filt + '">' + cnt + "</span>";
  }
  return '<div class="sb-item' + (act ? " act" : "") + '" id="sbn-' + id + '" onclick="' + onclick_ + '">' +
    '<div class="sb-icon">' + icon + "</div>" + label + cntHtml + "</div>";
}

function buildSbPlan() {
  var sb = document.getElementById("sidebar");
  var h = '<div class="sb-sec"><div class="sb-sec-lbl">Plan des ateliers</div>';
  RUBRIQUES.forEach(function(rub) {
    h += '<div class="sb-item" onclick="scrollPlanTo(\'' + rub.id + '\')">' +
      '<div class="sb-icon">' + rub.icon + "</div>" + rub.num + " — " + rub.label + (rub.soon ? '<span class="sb-soon">Bientot</span>' : "") + "</div>";
  });
  h += "</div>";
  sb.innerHTML = h;
}

function buildSbEmpty() {
  document.getElementById("sidebar").innerHTML = '<div style="padding:18px 14px;font-size:12px;color:rgba(255,255,255,.3);line-height:1.6">Section en cours de developpement.</div>';
}

// ═══ PAGE NAV ════════════════════════════════════════════════════
function goPage(p) {
  curPage = p;
  document.getElementById("si").value = "";
  filterAge_ = selAge_;

  var tc   = document.getElementById("tc");
  var vbtns = document.getElementById("vbtns");
  var afbar = document.getElementById("afbar");

  if (p === "home") {
    tc.style.display = "none"; vbtns.style.display = "none"; afbar.style.display = "none";
    document.getElementById("bc").innerHTML = "<b>Accueil — Bibliotheque</b>";
    buildSbBib();
    renderHome();
  } else if (p === "sub") {
    var res = findSub(curSubId);
    if (!res) return;
    vbtns.style.display = "flex"; tc.style.display = "inline-block"; afbar.style.display = "flex";
    buildAfbar();
    updateTc(res.sub);
    document.getElementById("bc").innerHTML =
      '<span style="cursor:pointer;color:var(--gray5)" onclick="goPage(\'home\')">' + res.rub.label + "</span>" +
      '<span class="bc-sep">›</span><b>' + res.sub.label + "</b>";
    buildSbBib();
    renderSub(res);
  }
}

function openSub(id) { curSubId = id; goPage("sub"); }

function findSub(id) {
  for (var i = 0; i < RUBRIQUES.length; i++) {
    for (var j = 0; j < RUBRIQUES[i].subs.length; j++) {
      if (RUBRIQUES[i].subs[j].id === id) return { rub: RUBRIQUES[i], sub: RUBRIQUES[i].subs[j] };
    }
  }
  return null;
}

function updateTc(sub) {
  var n = 0;
  (sub.ss || []).forEach(function(ss) { (ss.items || []).forEach(function(it) { if (ageOk(it, filterAge_)) n++; }); });
  document.getElementById("tc").textContent = n + " atelier" + (n > 1 ? "s" : "") + (filterAge_ && filterAge_ !== "ALL" ? " pour " + filterAge_ : "");
}

function buildAfbar() {
  var h = '<span style="font-size:10px;color:var(--gray5);font-weight:600;margin-right:2px">Categorie :</span>';
  h += '<span class="afc' + (!filterAge_ || filterAge_ === "ALL" ? " on" : "") + '" onclick="setAgeF(null)">Tous</span>';
  AGES.forEach(function(a) {
    h += '<span class="afc' + (filterAge_ === a ? " on" : "") + '" onclick="setAgeF(\'' + a + '\')">' + a + "</span>";
  });
  document.getElementById("afbar").innerHTML = h;
}

function setAgeF(a) {
  filterAge_ = a;
  buildAfbar();
  if (curPage === "sub") {
    var res = findSub(curSubId);
    if (res) { updateTc(res.sub); renderSub(res); }
  }
}

function setView(v) {
  viewMode = v;
  document.getElementById("vbgrid").classList.toggle("act", v === "grid");
  document.getElementById("vblist").classList.toggle("act", v === "list");
  var c = document.getElementById("content");
  if (v === "list") c.classList.add("lv"); else c.classList.remove("lv");
}

// ═══ RENDER HOME ═════════════════════════════════════════════════
function renderHome() {
  var seen = {}, total = 0, videos = 0;
  ALL_ITEMS.forEach(function(x) {
    if (!seen[x.item.id] && ageOk(x.item, selAge_)) {
      seen[x.item.id] = true;
      if (x.item.video) videos++; else total++;
    }
  });
  var ageLabel = selAge_ ? AGE_LABELS[selAge_] : "Tous niveaux";

  var h = '<div class="banner">' +
    '<div class="banner-title">Bibliotheque<br>des Ateliers EDR</div>' +
    '<div class="banner-sub">Ecole de Rugby du Mutzig Ovalie Molsheim</div>' +
    '<div class="banner-age">🎯 Affichage : ' + ageLabel + "</div></div>" +
    '<div class="stats">' +
    '<div class="stat"><div class="stat-n">' + total + '</div><div class="stat-l">Fiches</div></div>' +
    '<div class="stat"><div class="stat-n">' + videos + '</div><div class="stat-l">Videos</div></div>' +
    '<div class="stat"><div class="stat-n">4</div><div class="stat-l">Rubriques</div></div>' +
    '<div class="stat"><div class="stat-n" style="color:var(--gold)">' + (selAge_ === "ALL" ? "ALL" : (selAge_ || "?")) + '</div><div class="stat-l">Categorie</div></div>' +
    "</div>";

  RUBRIQUES.forEach(function(rub) {
    h += '<div class="sec-hd"><h2>' + rub.num + " — " + rub.label + (rub.soon ? ' <span style="font-size:11px;font-weight:500;color:var(--gray5)">(a venir)</span>' : "") + '</h2><div class="sec-line"></div></div>';
    h += '<div class="phase-grid" style="margin-bottom:18px">';
    rub.subs.forEach(function(sub) {
      if (sub.soon) {
        h += '<div class="phase-card dimmed"><div class="pc-top" style="background:' + sub.color + '"></div>' +
          '<div class="pc-body"><div class="pc-icon" style="background:' + sub.badge + '">' + sub.icon + "</div>" +
          '<div class="pc-info"><div class="pc-title">' + sub.label + '</div><div class="pc-sub">A venir</div></div></div></div>';
        return;
      }
      var cnt = countSub(sub, selAge_);
      var agesInSub = {};
      (sub.ss || []).forEach(function(ss) { (ss.items || []).forEach(function(it) { (it.ages || []).forEach(function(a) { agesInSub[a] = true; }); }); });
      var ageDots = AGES.filter(function(a) { return agesInSub[a]; }).map(function(a) {
        var hl = selAge_ === a ? "background:var(--gold);color:var(--g9)" : "";
        return '<span class="age-dot" style="' + hl + '">' + a + "</span>";
      }).join("");
      h += '<div class="phase-card' + (cnt === 0 ? " dimmed" : "") + '" onclick="openSub(\'' + sub.id + '\')">' +
        '<div class="pc-top" style="background:' + sub.color + '"></div>' +
        '<div class="pc-body"><div class="pc-icon" style="background:' + sub.badge + '">' + sub.icon + "</div>" +
        '<div class="pc-info"><div class="pc-title">' + sub.label + "</div>" +
        '<div class="pc-sub">' + cnt + " atelier" + (cnt > 1 ? "s" : "") + "</div></div>" +
        '<div class="pc-arr">›</div></div>' +
        '<div class="pc-ages">' + ageDots + "</div></div>";
    });
    h += "</div>";
  });

  var ct = document.getElementById("content");
  ct.innerHTML = h;
  ct.classList.remove("lv");
}

// ═══ RENDER SUB ══════════════════════════════════════════════════
function renderSub(res) {
  var sub = res.sub;
  var h = "";
  if (sub.comp && sub.comp.length) {
    h += '<div class="comp-bar" style="background:' + sub.badge + ';border-color:' + sub.color + '">' +
      '<div style="font-size:9px;font-weight:800;color:' + sub.badgeText + ';text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Comportements attendus</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:4px">' +
      sub.comp.map(function(b) {
        return '<span style="font-size:10px;font-weight:600;background:rgba(0,0,0,.07);padding:2px 7px;border-radius:8px;color:' + sub.badgeText + '">' + b + "</span>";
      }).join("") + "</div></div>";
  }

  var hasAny = false;
  var visibleSS = (sub.ss || []).filter(function(ss) { return !ss.soon; });

  (sub.ss || []).forEach(function(ss) {
    if (ss.soon) {
      h += '<div style="background:var(--goldl);border-radius:var(--r);padding:12px 16px;margin-bottom:12px;border-left:3px solid var(--gold);font-size:13px;color:var(--goldd)">🚧 <strong>' + ss.label + "</strong> — Ateliers a venir</div>";
      return;
    }
    var items = (ss.items || []).filter(function(it) { return ageOk(it, filterAge_); });
    if (!items.length) return;
    hasAny = true;
    if (visibleSS.length > 1) {
      h += '<div class="sub-lbl">' + ss.label + "</div>";
    }
    h += '<div class="cards">';
    items.forEach(function(item) {
      var gIdx = ALL_ITEMS.findIndex(function(x) { return x.item.id === item.id && x.sub.id === sub.id; });
      if (gIdx < 0) gIdx = ALL_ITEMS.findIndex(function(x) { return x.item.id === item.id; });
      h += makeCard(item, sub, gIdx);
    });
    h += "</div>";
  });

  if (!hasAny) {
    h += '<div class="nores"><div class="nores-ic">📭</div><div>Aucun atelier pour cette categorie<br><small>Utilisez le filtre "Tous" pour voir tous les ateliers</small></div></div>';
  }
  document.getElementById("content").innerHTML = h;
}

// ═══ CARD ════════════════════════════════════════════════════════
function makeCard(item, sub, gIdx) {
  var ageDots = (item.ages || []).map(function(a) {
    var hl = (selAge_ === a || filterAge_ === a) ? "background:var(--gold);color:var(--g9)" : "";
    return '<span class="card-age" style="' + hl + '">' + a + "</span>";
  }).join("");
  var crossH = item.cross ? '<div class="card-cross">Aussi dans : ' + item.cross + "</div>" : "";

  if (item.video) {
    return '<div class="card" onclick="openVideoIdx(' + gIdx + ')">' +
      '<div class="vcard-top"><div class="play"></div>' +
      '<span class="ct-badge" style="position:absolute;bottom:8px;left:8px;background:#fff0ed;color:#c53a22">&#9654; Video</span></div>' +
      '<div class="card-body"><div class="card-title">' + item.t + "</div>" +
      '<div class="card-sub">' + item.s + "</div>" +
      '<div class="card-tags"><span class="tag" style="background:#fff0ed;color:#c53a22">&#9654; Video</span></div>' +
      '<div class="card-ages">' + ageDots + "</div>" + crossH + "</div></div>";
  }
  var tags = item.tags || [];
  return '<div class="card" onclick="openDetailIdx(' + gIdx + ')">' +
    '<div class="card-top" style="background:' + sub.color + '">' +
    '<span class="ct-badge" style="background:' + sub.badge + ";color:" + sub.badgeText + '">' +
    (tags.indexOf("Echauffement") >= 0 ? "Echauffement" : "Atelier") + "</span>" +
    '<div class="ct-num">' + item.n + "</div></div>" +
    '<div class="card-body"><div class="card-title">' + item.t + "</div>" +
    '<div class="card-sub">' + item.s + "</div>" +
    '<div class="card-tags"><span class="tag" style="background:' + sub.badge + ";color:" + sub.badgeText + '">' + sub.icon + " " + sub.label + "</span>" +
    tags.map(function(t) { return '<span class="tag" style="background:var(--goldl);color:var(--goldd)">' + t + "</span>"; }).join("") +
    "</div>" +
    '<div class="card-ages">' + ageDots + "</div>" + crossH + "</div></div>";
}

// ═══ PLAN DES ATELIERS ═══════════════════════════════════════════
function renderPlan() {
  document.getElementById("bc").innerHTML = "<b>Plan des ateliers</b>";
  document.getElementById("tc").style.display = "none";
  document.getElementById("vbtns").style.display = "none";
  document.getElementById("afbar").style.display = "none";

  var h = "";
  RUBRIQUES.forEach(function(rub) {
    h += '<div class="plan-cat" id="pcat-' + rub.id + '">';
    h += '<div class="plan-cat-hd" onclick="togglePCat(\'' + rub.id + '\')">' +
      '<div class="plan-cat-icon" style="background:' + rub.badge + '">' + rub.icon + "</div>" +
      "<div><div class=\"plan-cat-title\">" + rub.num + " — " + rub.label + (rub.soon ? ' <span style="font-size:10px;color:var(--gray5)">(a venir)</span>' : "") + "</div>" +
      '<div class="plan-cat-sub">' + rub.desc + "</div></div>" +
      '<div class="plan-arr" id="parr-' + rub.id + '">›</div></div>';
    h += '<div class="plan-cat-body" id="pcb-' + rub.id + '">';

    if (rub.soon) {
      h += '<div class="plan-soon">🚧 Ateliers a venir — categorie en preparation</div>';
    } else {
      rub.subs.forEach(function(sub) {
        h += '<div class="plan-sub-hd" onclick="togglePSub(\'' + sub.id + '\')">' +
          '<span style="font-size:12px">' + sub.icon + "</span>" +
          '<div class="plan-sub-title">' + sub.label + "</div>" +
          '<div class="plan-sub-meta">— ' + sub.sub + "</div>" +
          '<div class="plan-sub-arr" id="sarr-' + sub.id + '">›</div></div>';
        h += '<div class="plan-sub-body" id="psb-' + sub.id + '">';

        if (sub.soon) {
          h += '<div class="plan-soon">🚧 A venir</div>';
        } else {
          var visibleSS = (sub.ss || []).filter(function(ss) { return !ss.soon && ss.items && ss.items.length > 0; });
          (sub.ss || []).forEach(function(ss) {
            if (ss.soon) { h += '<div class="plan-soon">🚧 ' + ss.label + " — A venir</div>"; return; }
            if (!ss.items || !ss.items.length) return;
            if (visibleSS.length > 1) {
              h += '<div class="plan-ss-lbl">' + ss.label + "</div>";
            }
            var seenIds = {};
            ss.items.forEach(function(item) {
              if (seenIds[item.id]) return;
              seenIds[item.id] = true;
              var ok = ageOk(item, selAge_);
              var gIdx = ALL_ITEMS.findIndex(function(x) { return x.item.id === item.id && x.sub.id === sub.id; });
              if (gIdx < 0) gIdx = ALL_ITEMS.findIndex(function(x) { return x.item.id === item.id; });
              h += '<div class="plan-item' + (ok ? "" : " dim") + '" onclick="openDetailIdx(' + gIdx + ')">' +
                '<div class="plan-item-num" style="background:' + sub.badge + ";color:" + sub.badgeText + '">' + item.n + "</div>" +
                '<div class="plan-item-title">' + item.t + "</div>" +
                (item.cross ? '<span class="plan-item-cross">x ' + item.cross + "</span>" : "") +
                (item.video ? '<span class="plan-item-video">&#9654;</span>' : "") +
                "</div>";
            });
          });
        }
        h += "</div>";
      });
    }
    h += "</div></div>";
  });

  var ct = document.getElementById("content");
  ct.innerHTML = h;
  ct.classList.remove("lv");
  togglePCat(RUBRIQUES[0].id);
}

function togglePCat(id) {
  var body = document.getElementById("pcb-" + id);
  var arr  = document.getElementById("parr-" + id);
  if (!body) return;
  var open = body.classList.toggle("open");
  if (arr) arr.classList.toggle("open", open);
}
function togglePSub(id) {
  var body = document.getElementById("psb-" + id);
  var arr  = document.getElementById("sarr-" + id);
  if (!body) return;
  var open = body.classList.toggle("open");
  if (arr) arr.classList.toggle("open", open);
}
function scrollPlanTo(id) {
  var el = document.getElementById("pcat-" + id);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  var body = document.getElementById("pcb-" + id);
  var arr  = document.getElementById("parr-" + id);
  if (body && !body.classList.contains("open")) { body.classList.add("open"); if (arr) arr.classList.add("open"); }
}

function renderSoon(icon, title, desc, badge) {
  document.getElementById("bc").innerHTML = "<b>" + title + "</b>";
  document.getElementById("tc").style.display = "none";
  document.getElementById("vbtns").style.display = "none";
  document.getElementById("afbar").style.display = "none";
  document.getElementById("content").innerHTML =
    '<div class="coming-soon">' +
    '<div class="cs-icon">' + icon + "</div>" +
    '<div class="cs-title">' + title + "</div>" +
    '<div class="cs-sub">' + desc + "</div>" +
    '<div class="cs-badge">' + badge + "</div></div>";
  document.getElementById("content").classList.remove("lv");
}

// ═══ MODAL ═══════════════════════════════════════════════════════
function openDetailIdx(idx) {
  if (idx < 0 || idx >= ALL_ITEMS.length) return;
  var x = ALL_ITEMS[idx];
  var item = x.item, sub = x.sub;

  document.getElementById("mbadge").textContent = x.rub.label;
  document.getElementById("mbadge").style.background = sub.badge;
  document.getElementById("mbadge").style.color = sub.badgeText;
  document.getElementById("mnum").textContent = "Seq. " + item.n;
  document.getElementById("mtitle").textContent = item.t;
  document.getElementById("msub").textContent = sub.label + (x.ss ? " — " + x.ss.label : "");
  document.getElementById("mage-row").innerHTML = (item.ages || []).map(function(a) {
    return '<span class="mage-chip' + (selAge_ === a ? " on" : "") + '">' + AGE_LABELS[a] + "</span>";
  }).join("");

  var tagsH = "";
  if (item.tags && item.tags.length) {
    tagsH = '<div class="msec"><div class="mlbl">Tags</div><div class="mchips">' +
      item.tags.map(function(t) { return '<span class="mchip" style="background:var(--goldl);color:var(--goldd)">' + t + "</span>"; }).join("") +
      "</div></div>";
  }
  var crossH = item.cross ? '<div class="msec"><div class="mlbl">Aussi presente dans</div><div class="mtext">' + item.cross + "</div></div>" : "";

  document.getElementById("mbody").innerHTML =
    '<div class="msec"><div class="mlbl">Rubrique pedagogique</div><div class="mtext">' + x.rub.icon + " " + x.rub.label + " &rsaquo; " + sub.label + "</div></div>" +
    '<div class="msec"><div class="mlbl">Description</div><div class="mtext">' + item.s + "</div></div>" +
    '<div class="msec"><div class="mlbl">Comportements travailles</div><div class="mchips">' +
    (sub.comp || []).map(function(b) { return '<span class="mchip">' + b + "</span>"; }).join("") +
    "</div></div>" + tagsH + crossH +
    buildCrossRefHtml(x.ss ? x.ss.id : "") +
    '<div class="minfo"><div class="minfo-t">📋 Fiche complete disponible sur Google Drive</div>' +
    '<div class="minfo-s">Dispositif · Objectifs · Organisation · Comportements attendus · Criteres de reussite</div></div>';

  document.getElementById("mftr").innerHTML =
    '<button class="btn btn-sec" onclick="closeModal()">Fermer</button>' +
    '<button class="btn btn-pri" onclick="window.open(\'https://drive.google.com/file/d/' + item.id + '/view\',\'_blank\')">📂 Ouvrir la fiche Drive</button>' +
    '<button class="btn btn-gold" onclick="window.open(\'https://drive.google.com/file/d/' + item.id + '/view\',\'_blank\')">🖥️ Presenter en seance</button>';

  document.getElementById("overlay").classList.add("open");
}

function openVideoIdx(idx) {
  if (idx < 0 || idx >= ALL_ITEMS.length) return;
  var x = ALL_ITEMS[idx], item = x.item;
  document.getElementById("mbadge").textContent = "Video";
  document.getElementById("mbadge").style.background = "#fff0ed";
  document.getElementById("mbadge").style.color = "#c53a22";
  document.getElementById("mnum").textContent = "";
  document.getElementById("mtitle").textContent = item.t;
  document.getElementById("msub").textContent = item.s;
  document.getElementById("mage-row").innerHTML = (item.ages || []).map(function(a) {
    return '<span class="mage-chip' + (selAge_ === a ? " on" : "") + '">' + AGE_LABELS[a] + "</span>";
  }).join("");
  document.getElementById("mbody").innerHTML =
    '<div style="position:relative;padding-bottom:56.25%;height:0;border-radius:var(--r);overflow:hidden;background:#000;margin-bottom:12px">' +
    '<iframe src="https://drive.google.com/file/d/' + item.id + '/preview" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none" allow="autoplay" allowfullscreen></iframe></div>' +
    '<div class="msec"><div class="mlbl">Description</div><div class="mtext">' + item.s + "</div></div>";
  document.getElementById("mftr").innerHTML =
    '<button class="btn btn-sec" onclick="closeModal()">Fermer</button>' +
    '<button class="btn btn-pri" onclick="window.open(\'https://drive.google.com/file/d/' + item.id + '/view\',\'_blank\')">📂 Ouvrir dans Drive</button>';
  document.getElementById("overlay").classList.add("open");
}

function closeModal()  { document.getElementById("overlay").classList.remove("open"); }
function overlayClick(e) { if (e.target === document.getElementById("overlay")) closeModal(); }

function getFicheRef(id) {
  return FICHES_REF.find(function(f){ return f.id === id; }) ||
         CARTES_MENTALES.find(function(f){ return f.id === id; });
}

function getCrossRefs(ssId) {
  var ids = CROSS_REFS[ssId] || [];
  return ids.map(getFicheRef).filter(Boolean);
}

function goSection_ressources() {
  document.getElementById("bc").innerHTML = "<b>Ressources pedagogiques</b>";
  document.getElementById("tc").style.display = "none";
  document.getElementById("vbtns").style.display = "none";
  document.getElementById("afbar").style.display = "none";
  buildSbRessources();

  var h = "";

  // -- Fiches de reference --
  h += '<div class="sec-hd"><h2>📖 Fiches de reference — Definitions et Points clefs</h2><div class="sec-line"></div></div>';
  h += '<div class="res-grid">';
  FICHES_REF.forEach(function(f) {
    h += '<div class="res-card">' +
      '<div class="res-card-top" style="background:' + f.color + '"></div>' +
      '<div class="res-card-body">' +
      '<div class="res-card-icon" style="font-size:24px">' + f.icon + '</div>' +
      '<div class="res-card-title">' + f.title + '</div>' +
      '<div class="res-card-sub">' + f.sub + '</div>' +
      '<button class="res-card-btn" onclick="window.open(\'https://drive.google.com/file/d/' + f.driveId + '/view\',\'_blank\')">📂 Ouvrir la fiche</button>' +
      '</div></div>';
  });
  h += '</div>';

  // -- Cartes mentales --
  h += '<div class="sec-hd"><h2>🧠 Cartes mentales</h2><div class="sec-line"></div></div>';
  h += '<div class="res-grid">';
  CARTES_MENTALES.forEach(function(f) {
    h += '<div class="res-card">' +
      '<div class="res-card-top" style="background:' + f.color + '"></div>' +
      '<div class="res-card-body">' +
      '<div class="res-card-icon">🧠</div>' +
      '<div class="res-card-title">' + f.title + '</div>' +
      '<div class="res-card-sub">' + f.sub + '</div>' +
      '<button class="res-card-btn" onclick="window.open(\'https://drive.google.com/file/d/' + f.driveId + '/view\',\'_blank\')">📂 Ouvrir</button>' +
      '</div></div>';
  });
  h += '</div>';

  // -- Grilles par age --
  h += '<div class="sec-hd"><h2>📊 Grilles de comportements par categorie d\'age</h2><div class="sec-line"></div></div>';
  h += '<div class="age-grid-section">';
  GRILLES_AGE.forEach(function(g) {
    var isSelected = selAge_ === g.age;
    var borderStyle = isSelected ? 'border:2px solid var(--gold)' : '';
    h += '<div class="age-card" style="' + borderStyle + '">';
    h += '<div class="age-card-top">';
    h += '<div class="age-card-badge" style="background:' + (isSelected ? 'var(--gold)' : g.bg) + ';color:' + (isSelected ? 'var(--g9)' : g.color) + '">' + g.age + '</div>';
    h += '<div><div class="age-card-title" style="color:' + g.color + '">' + g.label + '</div></div>';
    h += '</div>';
    if (g.soon) {
      h += '<div class="age-card-soon">🚧 Grille FFR a venir pour cette categorie</div>';
    } else {
      h += '<div class="age-card-comps">';
      g.comps.forEach(function(c) { h += '<div class="age-comp">' + c + '</div>'; });
      h += '</div>';
      if (g.driveId) {
        h += '<div style="padding:0 14px 12px">' +
          '<button class="res-card-btn" onclick="window.open(\'https://drive.google.com/file/d/' + g.driveId + '/view\',\'_blank\')">📊 Ouvrir la grille Excel</button>' +
          '</div>';
      }
    }
    h += '</div>';
  });
  h += '</div>';

  document.getElementById("content").innerHTML = h;
  document.getElementById("content").classList.remove("lv");
}

// ═══ BLOC FICHE DE REFERENCE dans le modal ═══════════════════════

function buildCrossRefHtml(ssId) {
  var refs = getCrossRefs(ssId);
  if (!refs.length) return "";
  var h = '<div style="margin-top:12px"><div class="mlbl">📖 Fiche(s) de reference associee(s)</div>';
  refs.forEach(function(f) {
    h += '<div class="mref">' +
      '<div class="mref-icon">' + f.icon + '</div>' +
      '<div class="mref-text">' +
      '<div class="mref-title">' + f.title + '</div>' +
      '<div class="mref-sub">Definition · Objectifs · Points clefs</div>' +
      '</div>' +
      '<button class="mref-btn" onclick="window.open(\'https://drive.google.com/file/d/' + f.driveId + '/view\',\'_blank\')">Ouvrir →</button>' +
      '</div>';
  });
  h += '</div>';
  return h;
}

function doSearch() {
  var q = document.getElementById("si").value.toLowerCase().trim();
  if (!q) {
    if (curSection === "bib") { if (curPage === "home") renderHome(); else { var r = findSub(curSubId); if (r) renderSub(r); } }
    return;
  }
  var results = [], seen = {};
  UNIQ.forEach(function(x) {
    if (!ageOk(x.item, selAge_)) return;
    var m = x.item.t.toLowerCase().indexOf(q) >= 0 ||
            x.item.s.toLowerCase().indexOf(q) >= 0 ||
            x.sub.label.toLowerCase().indexOf(q) >= 0 ||
            x.rub.label.toLowerCase().indexOf(q) >= 0 ||
            (x.sub.comp || []).some(function(c) { return c.toLowerCase().indexOf(q) >= 0; });
    if (m && !seen[x.item.id]) { seen[x.item.id] = true; results.push(x); }
  });
  document.getElementById("bc").innerHTML = "<b>Resultats pour \"" + q + '"</b>' +
    (selAge_ && selAge_ !== "ALL" ? ' <span style="font-size:10px;background:var(--g0);color:var(--g6);padding:1px 7px;border-radius:9px;font-weight:700">' + selAge_ + "</span>" : "");
  document.getElementById("tc").style.display = "inline-block";
  document.getElementById("tc").textContent = results.length + " resultat" + (results.length !== 1 ? "s" : "");
  document.getElementById("vbtns").style.display = "flex";
  document.getElementById("afbar").style.display = "none";
  var c = document.getElementById("content");
  if (!results.length) {
    c.innerHTML = '<div class="nores"><div class="nores-ic">🔍</div><div>Aucun resultat pour "' + q + '"</div></div>';
    return;
  }
  c.innerHTML = '<div class="cards">' + results.map(function(r) { return makeCard(r.item, r.sub, r.gIdx); }).join("") + "</div>";
}
